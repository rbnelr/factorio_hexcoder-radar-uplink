[tooltip]
hexcoder_radar_uplink-read_comms_mode=Send and receive circuit signals from other radars
hexcoder_radar_uplink-read_platforms_mode=Read space platforms

hexcoder_radar_uplink-read_status=Read space platform status (unlimited range)\n[virtual-signal=signal-P]: Platform ID\n[space-location=nauvis]=1: Orbiting planet (Check using [space-location=nauvis]>0)\n[space-location=nauvis]=-1 [space-location=gleba]=-2: Travelling from [space-location=nauvis] to [space-location=gleba]\nConnection progress in %: [virtual-signal=signal-T] and in km: [virtual-signal=signal-D]\nCurrent speed [virtual-signal=signal-V] in km/s
hexcoder_radar_uplink-read_unful_req=Read unfulfilled space platform requests\nLimited to platforms in orbit\nAdditional signal [virtual-signal=signal-info] to when receiving\nEquivalent to [color=#a0a0a0]requests - on_the_way - inventory[/color] | where > 0
hexcoder_radar_uplink-read_req=Read raw requests in hub logistic sections\nThese are automatically filtered by current planet
hexcoder_radar_uplink-read_otw=Read rocket deliveries 'on the way' to the platform hub\nFrom launch animation until the pod has fully landed
hexcoder_radar_uplink-read_inv=Read hub inventory contents
hexcoder_radar_uplink-read_inv_slots=Read total hub inventory slots\nHint [virtual-signal=signal-info]: Used slots can be calculated via circuit (See mod page)

hexcoder_radar_uplink-dyn_enable=Enable dynamic selection\nThe radar will frequently read signals on the selected wires and switch the selected channel\n[virtual-signal=signal-number-sign] will select a channel/platform via index as seen on the left\n[virtual-signal=signal-P] will select a platform via unique ID\n[virtual-signal=signal-X] or other signals can select a channel/platform via name
hexcoder_radar_uplink-dyn_name=The text used for dynamic selection via channel/platform name\nAny wildcard '{}' will be replaced with the number in the [virtual-signal=signal-X] or TODO:

hexcoder_radar_uplink-tick2_suffix=(2 tick delay due to hidden combinators)
