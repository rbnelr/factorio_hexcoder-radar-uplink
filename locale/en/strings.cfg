hexcoder_radar_uplink-read_status_desc=Read space platform status (unlimited range)\n[virtual-signal=signal-P]: Platform ID\n[space-location=nauvis]=1: Orbiting planet (Check using [space-location=nauvis]>0)\n[space-location=nauvis]=-1 [space-location=gleba]=-2: Travelling from [space-location=nauvis] to [space-location=gleba]\nConnection progress in %: [virtual-signal=signal-T] and in km: [virtual-signal=signal-D]\Current speed [virtual-signal=signal-V] in km/s
hexcoder_radar_uplink-read_unful_req_desc=Read unfulfilled space platform requests\nLimited to platforms in orbit - additional signal [virtual-signal=signal-info] to differentiate no signal from no requests\nEquivalent to [color=#a0a0a0]requests - on_the_way - inventory[/color] but only showing positives
hexcoder_radar_uplink-read_req_desc=Raw requests as configured in platform hub logistic section\nbut automatically filtered for orbited planet
hexcoder_radar_uplink-read_otw_desc=Item deliveries 'on the way' to the platform hub via cargo pods\nCounts from the moment the rocket silo begins the launch animation until the pod has fully landed
hexcoder_radar_uplink-read_inv_desc=Space platform hub inventory
