hexcoder_radar_uplink-status_desc=Read space platform status with unlimited range\n[virtual-signal=signal-P]: Platform ID[space-location=nauvis]=1: Currently orbited planet (Check using [space-location=nauvis]>0)\n[space-location=nauvis]=-1 [space-location=gleba]=-2: Travelling on space connection from [space-location=nauvis] to [space-location=gleba] (Swapped depending on travel direction)\n[space-location=aquilo]=-10: Next stop in platform schedule while in transit\n[virtual-signal=signal-T] Space connection progress in % and [virtual-signal=signal-D] in km\n
hexcoder_radar_uplink-request_unful_req_desc=Read unfulfilled space platform requests\nLimited to platforms in orbit - additional signal [virtual-signal=signal-info] to help detect no signal from no requests\nEquivalent to requests - on_the_way - inventory but only showing positives
hexcoder_radar_uplink-request_req_desc=Raw requests as configured in platform hub logistic requests\nbut automatically filtered by import from planet
hexcoder_radar_uplink-request_otw_desc=Items 'on the way' to the platform hub via cargo pods\nfrom time rockets begins launch animation to pod having fully landed
hexcoder_radar_uplink-request_inv_desc=Space platform hub inventory

