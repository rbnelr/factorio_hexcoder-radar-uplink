[tooltip]
hexcoder_radar_uplink-read_comms_mode=Send and receive circuit signals from other radars
hexcoder_radar_uplink-read_platforms_mode=Read space platforms

hexcoder_radar_uplink-read_status=Read space platform status (unlimited range)\n[virtual-signal=signal-P]: Platform ID\n[space-location=nauvis]=3: Orbiting planet\n[space-location=nauvis]=1 [space-location=gleba]=2: Travelling from [space-location=nauvis] to [space-location=gleba]\n[virtual-signal=signal-T]: Connection progress in %\n[virtual-signal=signal-D]: Connection progress in km\n[virtual-signal=signal-V]: Current speed in km/s
hexcoder_radar_uplink-read_unful_req=Read unfulfilled space platform requests\nLimited to platforms in orbit\nEquivalent to [color=#90b0ff]requests - on_the_way - inventory[/color]
hexcoder_radar_uplink-read_req=Read raw requests in hub logistic sections\nThese are automatically filtered by current planet
hexcoder_radar_uplink-read_otw=Read rocket deliveries 'on the way' to the platform hub\nFrom launch animation until the pod has fully landed
hexcoder_radar_uplink-read_inv=Read hub inventory contents
hexcoder_radar_uplink-read_inv_slots=Read total hub inventory slots\nHint: Used slots can be calculated via circuit (See mod page)

hexcoder_radar_uplink-dyn_enable=Auto-switch channel/platform via circuits\nThe signal should be held as it is not read every tick\nThe first valid signal wins\n[virtual-signal=signal-P]: Unique ID like in platform status\n[virtual-signal=signal-number-sign]: Index as seen in the list\n[virtual-signal=signal-X]: Wildcard for name-based matching
hexcoder_radar_uplink-dyn_name=The text to find channel/platform by name\nAny wildcard '{}' will be replaced with [virtual-signal=signal-X] signal count

hexcoder_radar_uplink-tick2_suffix=(2 tick delay due to hidden combinators)
